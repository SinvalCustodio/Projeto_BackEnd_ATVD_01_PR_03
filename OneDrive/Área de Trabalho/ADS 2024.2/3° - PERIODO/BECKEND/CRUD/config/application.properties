# Nome da aplicação
spring.application.name=marketplace

# Configuração do banco de dados H2 (em memória)
spring.datasource.url=jdbc:h2:mem:marketplacedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialeto do Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Atualiza automaticamente o esquema do banco (create-drop = recria ao iniciar)
spring.jpa.hibernate.ddl-auto=update

# Habilita o console do H2 (para acessar http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mostra as queries SQL no log
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== CONFIGURAÇÕES DO SWAGGER/SPRINGDOC-OPENAPI =====
# Caminho para acessar a documentação Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Caminho para acessar o arquivo OpenAPI (JSON)
springdoc.api-docs.path=/v3/api-docs

# Configurações de apresentação do Swagger UI
springdoc.swagger-ui.show-logger=true
springdoc.swagger-ui.use-root-path=true

# URL base da API (deixar vazio para localhost)
# springdoc.swagger-ui.base-url=http://localhost:8080

# Porta do servidor (padrão 8080)
server.port=8080

# Contexto da aplicação
server.servlet.context-path=/